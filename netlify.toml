[build]
  command = "node scripts/build-netlify.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[build.processing]
  skip_processing = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'wasm-unsafe-eval' 'sha256-+hTLZgRbc3DU42C3Ivv4V7gOO59dAfecdOBP0l7k/t4='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy = "camera=(), geolocation=(), microphone=(), payment=(), usb=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "text/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/assets/*.glb"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    Content-Type = "model/gltf-binary"

[[headers]]
  for = "/assets/derived/*.glb"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    Content-Type = "model/gltf-binary"

[[headers]]
  for = "/assets/draco/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/wasm"

[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/vendor/three/0.185.0/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
